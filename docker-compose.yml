services:
  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: ecommerce-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/ecommerce
      REACT_APP_FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - ecommerce_network
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ecommerce-frontend
    ports:
      - "3000:8080"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - ecommerce_network
    depends_on:
      - backend
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  mongo_data:
    name: ecommerce_mongo_data

networks:
  ecommerce_network:
    name: ecommerce_network
    driver: bridge